services:
  # -------------------------
  # PostgreSQL Database
  # -------------------------
  db:
    image: postgres:latest
    container_name: PostgreSQL_DB
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER_SECRET}
      POSTGRES_PASSWORD: ${DB_PASSWORD_SECRET}
      POSTGRES_DB: ${DB_NAME_SECRET}
    ports:
      - "5432:5432"
    volumes:
      # מיפוי קובץ ה-SQL ישירות לתיקיית האתחול
      - ./init-db/createTables.sql:/docker-entrypoint-initdb.d/01-create-tables.sql
      # הוספת ה-/data כדי שהנתונים באמת יישמרו ולא יימחקו
      - postgres_data:/var/lib/postgresql
    networks:
      - zoo_network
      
  # -------------------------
  # pgAdmin
  # -------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadminApp
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
    networks:
      - zoo_network

# -------------------------
# Volumes
# ------------------------
volumes:
  postgres_data:
  pgadmin_data:

networks:
  zoo_network: